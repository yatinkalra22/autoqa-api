# =============================================================================
# Cloud Build — CI/CD Pipeline for AutoQA API
# =============================================================================
# Triggered on push to main branch. Builds, pushes, and deploys to Cloud Run.
#
# Setup:
#   gcloud builds triggers create github \
#     --repo-name=autoqa-api \
#     --repo-owner=YOUR_GITHUB_USERNAME \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml
# =============================================================================

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: autoqa-api
  _REPO_NAME: autoqa
  _DB_INSTANCE: autoqa-db

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--cpu=2'
      - '--memory=2Gi'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300s'
      - '--concurrency=10'
      - '--set-secrets=GEMINI_API_KEY=autoqa-gemini-key:latest,FIREBASE_PROJECT_ID=autoqa-firebase-project-id:latest,DATABASE_URL=autoqa-database-url:latest'
      - '--add-cloudsql-instances=${_DB_INSTANCE}'
      - '--quiet'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
